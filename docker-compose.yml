services:
  db:
    image: postgres:15-alpine
    container_name: mafia_db
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      POSTGRES_DB: mafia_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    # Порт наружу НЕ открываем

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mafia_backend
    env_file:
      - ./backend/.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/mafia_db
    volumes:
      - maven_cache:/root/.m2
    restart: unless-stopped
    depends_on:
      - db
    # Запускаем скомпилированный jar вместо mvnw в production
    command: java -jar target/backend-0.0.1-SNAPSHOT.jar

  minio:
    image: minio/minio:latest
    container_name: mafia_minio
    command: server /data --console-address ":9001"
    env_file:
      - ./backend/.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: mafia_minio_init
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - ./backend/.env
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/avatars;
        mc anonymous set download local/avatars;
        echo 'MinIO bucket avatars ready';
      "
    restart: on-failure

  # Фронтенд теперь — статика через nginx, НЕ dev server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mafia_frontend
    restart: unless-stopped
    # Порт наружу НЕ открываем — только через основной nginx

  nginx:
    image: nginx:alpine
    container_name: mafia_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit
    container_name: mafia_mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    restart: unless-stopped

volumes:
  postgres_data:
  maven_cache:
  minio_data: