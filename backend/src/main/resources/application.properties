spring.application.name=mafia-manager

# ─── DataSource ────────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mafia_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:mafia_admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true

# ─── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:2592000000}

# ─── Mail ──────────────────────────────────────────────────────────────────────
# В dev: Mailpit (docker-контейнер, SMTP на порту 1025)
# В prod: заменить на реальный SMTP (например Brevo)
spring.mail.host=${MAIL_HOST:mailpit}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}

# ─── App custom properties ─────────────────────────────────────────────────────
# Адрес "от" в письмах
app.mail.from=${APP_MAIL_FROM:noreply@mafia-manager.local}
# Базовый URL фронтенда — используется для генерации ссылки сброса пароля
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# ─── Springdoc / Swagger ───────────────────────────────────────────────────────
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.show-common-extensions=true

# ??? MinIO / Object Storage ????????????????????????????????????????????????????
storage.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
storage.minio.access-key=${MINIO_ROOT_USER:minioadmin}
storage.minio.secret-key=${MINIO_ROOT_PASSWORD:minioadmin_secret_password}
storage.minio.bucket.avatars=${MINIO_BUCKET_AVATARS:avatars}
# ????????? URL ??? ?????? ?????? ????????
# Dev:  http://localhost:9000
# Prod: https://storage.yourdomain.com
storage.minio.public-url=${MINIO_PUBLIC_URL:http://localhost:9000}

spring.servlet.multipart.max-file-size=5MB